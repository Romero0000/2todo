<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer type="module"></script>
    <script src="utils.js" defer type="module"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretty-checkbox@3.0/dist/pretty-checkbox.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>todo app</title>
</head>
<body>
     <header class="header">
        <h1 >TODO APP</h1>
     </header>
     <main>
        <section class="add-todo-container">
        <input type="text" placeholder=" what to do?"
        class="add-todo-input " data-add-todo-input>
        <button class="add-todo-btn" data-add-todo-btn>add 🫀</button>

        </section>
        

        <section class="search-input-container">
            <input type="text" placeholder=" search todo 🔎"
        class="search-todo-input " data-search-todo-input>
        </section>
        <hr>

        <section class="tudo-list-container" data-todo-container></section>
     </main>
     <template data-todo-template>
        <div class="todo ">
            <input type="checkbox" class="todo-checkbox p-round" data-todo-checkbox>
            <div class="todo-info">
                <p class="todo-text" data-todo-text>go to gym</p>
                <span class="todo-date" data-todo-date>14.07.26</span>
            </div>
            <button class="remove-todo" data-remove-todo>❌</button>
        </div>
     </template>
</body>
</html>
